<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuAI — Landing Page</title>
    <style>
      :root {
        --bg: #111315;
        --text: #f3f5f7;
        --teal: #00a8a8;
        --muted: #8c959f;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(2rem, 5vw, 4rem);
        margin: 0 0 1rem;
      }
      p {
        max-width: 60ch;
        color: var(--muted);
      }
      strong {
        color: var(--teal);
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>HuAI</h1>
        <p>
          <strong>Dark premium</strong> landing page placeholder z miejscem na
          pełną architekturę wizualną i płynny scroll.
        </p>
      </section>
    </main>
  </body>
</html>
